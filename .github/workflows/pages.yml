name: Deploy demo to GitHub Pages

on:
  # Auto-deploy on every push to main
  push:
    branches: [main]
  # Allow manual re-deploys from the Actions tab
  workflow_dispatch:

# Concurrency: cancel in-flight deploys when a newer push comes in
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build static demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        # GITHUB_PAGES_BASE makes Vite prefix all asset URLs with /kingdomos/
        # so the bundle works under the GitHub Pages subpath.
        env:
          GITHUB_PAGES_BASE: /kingdomos/
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
